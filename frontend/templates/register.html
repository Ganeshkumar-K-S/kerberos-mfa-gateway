<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Montserrat',sans-serif;
        }

        body{
            background:white;
        }

        .auth-scene{
            min-height:100vh;
            display:flex;
        }

        /* IMAGE LEFT */
        .auth-left{
            flex:1;
        }

        .auth-left img{
            width:100%;
            height:100%;
            object-fit:contain;
        }

        /* FORM RIGHT */
        .auth-right{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .login-card{
            background:rgba(255,255,255,0.65);
            backdrop-filter: blur(14px);
            padding:45px;
            border-radius:20px;
            width:100%;
            max-width:380px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        .heading{
            font-size:34px;
            margin-bottom:6px;
        }

        .heading span{
            color:#6c47ff;
        }

        .sub{
            color:#8c8a9a;
            margin-bottom:20px;
            font-size:14px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            font-size:14px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid #e5e4ef;
        }

        .input-group input:focus{
            outline:none;
            border-color:#6c47ff;
            box-shadow:0 0 0 2px rgba(108,71,255,0.15);
        }

        button{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            background:#6c47ff;
            color:white;
            cursor:pointer;
            font-weight:500;
        }

        button:hover{
            background:#5835e8;
        }

        .footer{
            text-align:center;
            margin-top:15px;
            font-size:13px;
        }

        .footer a{
            color:#6c47ff;
            text-decoration:none;
            font-weight:500;
        }

        @media(max-width:900px){
            .auth-left{
                display:none;
            }
        }
    </style>
</head>

<body>

<div class="auth-scene">

    <!-- IMAGE LEFT -->
    <div class="auth-left">
        <img src="/frontend/images/registraion.png">
    </div>

    <!-- FORM RIGHT -->
    <div class="auth-right">
        <div class="login-card">

            <h1 class="heading">Create <br><span>Account</span></h1>
            <p class="sub">Register to get started</p>

            <form id="registerForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit">Register</button>
            </form>

            <div class="footer">
                Already have an account? <a href="login.html">Login</a>
            </div>

        </div>
    </div>

</div>

<!-- SCRIPT UNCHANGED -->
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    const res = await fetch("http://127.0.0.1:8000/auth/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    alert(result.message || result.error);
});
</script>

</body>
</html>
