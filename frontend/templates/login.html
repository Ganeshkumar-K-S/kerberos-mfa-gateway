<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Montserrat',sans-serif;
        }

        body{
            background:white;
        }

        .auth-scene{
            min-height:100vh;
            display:flex;
        }

        .auth-left{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .login-card{
            background:rgba(255,255,255,0.65);
            backdrop-filter: blur(14px);
            padding:45px;
            border-radius:20px;
            width:100%;
            max-width:380px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        .heading{
            font-size:34px;
            margin-bottom:6px;
        }

        .heading span{
            color:#6c47ff;
        }

        .sub{
            color:#8c8a9a;
            margin-bottom:20px;
            font-size:14px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            font-size:14px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:12px;
            margin-top:6px;
            border-radius:10px;
            border:1px solid #e5e4ef;
        }

        .input-group input:focus{
            outline:none;
            border-color:#6c47ff;
            box-shadow:0 0 0 2px rgba(108,71,255,0.15);
        }

        button{
            width:100%;
            padding:13px;
            border:none;
            border-radius:12px;
            background:#6c47ff;
            color:white;
            cursor:pointer;
            font-weight:500;
        }

        button:hover{
            background:#5835e8;
        }

        .footer{
            text-align:center;
            margin-top:15px;
            font-size:13px;
        }

        .footer a{
            color:#6c47ff;
            text-decoration:none;
            font-weight:500;
        }

        .hidden{
            display:none;
        }

        .auth-right{
            flex:1;
        }

        .auth-right img{
            width:100%;
            height:100%;
            object-fit:contain;
        }

        @media(max-width:900px){
            .auth-right{
                display:none;
            }
        }
    </style>
</head>

<body>

<div class="auth-scene">

    <div class="auth-left">
        <div class="login-card">

            <h1 class="heading">Secure <br><span>Login</span></h1>
            <p class="sub">Authenticate with OTP verification</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            <!-- OTP SECTION -->
            <div id="otpSection" class="hidden">
                <div class="input-group">
                    <label>Enter OTP</label>
                    <input type="text" id="otp">
                </div>
                <button onclick="verifyOtp()">Verify OTP</button>
            </div>

            <div class="footer">
                Don't have an account? <a href="register.html">Register</a>
            </div>

        </div>
    </div>

    <div class="auth-right">
        <img src="/frontend/images/login.png">
    </div>

</div>

<script>
let storedEmail = "";
let storedPassword = "";

async function sha256(message) {
    const encoder = new TextEncoder();
    const data = encoder.encode(message);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function deriveKc(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return new Uint8Array(hash);
}

function decryptAES(cipherTextBase64, keyBytes) {
    const keyHex = Array.from(keyBytes)
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');

    const key = CryptoJS.enc.Hex.parse(keyHex);

    const decrypted = CryptoJS.AES.decrypt(
        { ciphertext: CryptoJS.enc.Base64.parse(cipherTextBase64) },
        key,
        { mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.Pkcs7 }
    );

    return decrypted.toString(CryptoJS.enc.Utf8);
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    storedEmail = document.getElementById("email").value;
    storedPassword = document.getElementById("password").value;

    const res = await fetch("http://127.0.0.1:8000/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: storedEmail,
            password: storedPassword,
            id_tgs: "TGS1",
            ts1: new Date().toISOString(),
        })
    });

    const result = await res.json();

    if (result.error) {
        alert(result.error);
        return;
    }

    alert("OTP sent to your email");
    document.getElementById("otpSection").classList.remove("hidden");

    localStorage.setItem("nonce", result.nonce);
});

async function verifyOtp() {
    const otp = document.getElementById("otp").value;
    const nonce = localStorage.getItem("nonce");

    const responseHash = await sha256(storedPassword + nonce);

    const res = await fetch("http://127.0.0.1:8000/auth/verify-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: storedEmail,
            otp: otp,
            password: storedPassword,
            response: responseHash
        })
    });

    const result = await res.json();
    console.log(result);

    if (result.error) {
        alert(result.error);
        return;
    }

    if (!result.response) {
        alert("Something went wrong");
        return;
    }

    const Kc = await deriveKc(storedPassword);
    const decrypted = decryptAES(result.response, Kc);

    if (!decrypted || decrypted.length < 10) {
        alert("Decryption failed (wrong key)");
        return;
    }

    const parts = decrypted.split("|");

    if (parts.length < 6) {
        alert("Invalid response format");
        return;
    }

    const Kc_tgs = parts[0];
    const IDc = parts[1];
    const IDtgs = parts[2];
    const TS2 = parts[3];
    const lifetime2 = parseInt(parts[4]);
    const ticket_tgs = parts[5];

    if (IDc !== storedEmail) return alert("User mismatch");
    if (IDtgs !== "TGS1") return alert("Invalid TGS");

    const ts = new Date(TS2 + "Z");
    const now = new Date();

    if ((now - ts) / 1000 > lifetime2) {
        alert("Session expired");
        return;
    }

    localStorage.setItem("ticket_tgs", ticket_tgs);
    localStorage.setItem("session_key", Kc_tgs);

    alert("Login successful");

    localStorage.setItem("email", storedEmail);
    console.log("Stored email:", storedEmail);

    window.location.href = "index.html";
}
</script>
</body>
</html>
